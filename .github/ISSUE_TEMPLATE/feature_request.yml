name: Feature Request
description: Suggest a new guide, improvement, or addition to the playbook
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for the playbook? We'd love to hear it!

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New guide
        - Improvement to existing guide
        - New template
        - New checklist
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see added or changed?
      placeholder: "A guide on GraphQL API design standards, covering schema design, naming conventions, and error handling..."
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Why is this needed?
      description: What problem does this solve or what gap does it fill?
      placeholder: "The playbook currently only covers REST APIs, but many projects use GraphQL..."
    validations:
      required: true

  - type: textarea
    id: examples
    attributes:
      label: Examples or references
      description: Any links, resources, or examples that could help?
      placeholder: "https://graphql.org/learn/best-practices/"
    validations:
      required: false
