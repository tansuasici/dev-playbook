name: Lint & Link Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            **/*.md
            !CHANGELOG.md
          config: ".markdownlint.json"

  link-check:
    name: Check Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for broken links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude-path CHANGELOG.md
            --exclude "example.com"
            --exclude "localhost"
            --exclude "wiki.internal"
            --exclude "docs.api.com"
            --exclude "grafana.internal"
            --exclude "external-api"
            --exclude "api.example.com"
            "**/*.md"
          fail: true
