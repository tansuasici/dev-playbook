name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      pr_branch: ${{ steps.pr-info.outputs.branch }}
      pr_sha: ${{ steps.pr-info.outputs.sha }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

      - name: Get PR info
        id: pr-info
        if: steps.release.outputs.pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_JSON: ${{ steps.release.outputs.pr }}
          REPO: ${{ github.repository }}
        run: |
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
          PR_BRANCH=$(echo "$PR_JSON" | jq -r '.headBranchName')
          PR_SHA=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.head.sha')
          echo "branch=${PR_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "sha=${PR_SHA}" >> "$GITHUB_OUTPUT"

  validate-release-pr:
    name: Validate Release PR
    needs: release-please
    if: needs.release-please.outputs.pr_sha
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.pr_branch }}

      - name: Markdown Lint
        id: markdown-lint
        continue-on-error: true
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            **/*.md
            !CHANGELOG.md
          config: .markdownlint.json

      - name: Link Check
        id: link-check
        continue-on-error: true
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude-path CHANGELOG.md
            --exclude "example.com"
            --exclude "localhost"
            --exclude "wiki.internal"
            --exclude "docs.api.com"
            --exclude "grafana.internal"
            --exclude "external-api"
            --exclude "api.example.com"
            "**/*.md"
          fail: true

      - name: Report status checks
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ needs.release-please.outputs.pr_sha }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ML_RESULT: ${{ steps.markdown-lint.outcome }}
          LC_RESULT: ${{ steps.link-check.outcome }}
        run: |
          report_status() {
            local context="$1" outcome="$2"
            local state="success"
            local desc="Passed (via release workflow)"
            case "$outcome" in
              failure)  state="failure"; desc="Failed (via release workflow)" ;;
              cancelled) state="error"; desc="Cancelled (via release workflow)" ;;
              skipped)  state="pending"; desc="Skipped (via release workflow)" ;;
            esac
            gh api "repos/${REPO}/statuses/${SHA}" \
              --method POST \
              --field state="${state}" \
              --field context="${context}" \
              --field description="${desc}" \
              --field "target_url=${RUN_URL}"
          }
          report_status "Markdown Lint" "$ML_RESULT"
          report_status "Link Check" "$LC_RESULT"
